
services:
  - type: web
    name: mailroom-demo
    runtime: python
    plan: free
    region: ohio                
    branch: main                

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health    

    envVars:
      # --- safe-to-commit defaults ---
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: APP_ENV
        value: production
      - key: DRY_RUN
        value: "false"           
      - key: CONFIDENCE_THRESHOLD
        value: "0.70"
      - key: DATABASE_URL
        value: sqlite:///./data/agent.db
      - key: SLACK_DEFAULT_CHANNEL
        value: "#general"

      # --- secrets (filled in via the Render dashboard after first deploy) ---
      - key: OPENAI_API_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: ASANA_ACCESS_TOKEN
        sync: false
      - key: ASANA_DEFAULT_PROJECT_GID
        sync: false
      - key: ASANA_DEFAULT_WORKSPACE_GID
        sync: false